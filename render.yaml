services:
  - type: web
    name: sarksearch-web
    runtime: static
    branch: master
    autoDeploy: true
    buildCommand: npm ci && npm run build --workspace apps/web
    staticPublishPath: ./apps/web/dist
    buildFilter:
      paths:
        - apps/web/**
        - package.json
        - package-lock.json
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: sarksearch-api
          type: web
          property: host
      - key: VITE_DEFAULT_RESULT_LIMIT
        value: "5"
      - key: VITE_MAX_RESULT_LIMIT
        value: "20"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: sarksearch-api
    runtime: node
    plan: starter
    branch: master
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm run start --workspace services/node-api
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - services/node-api/**
        - package.json
        - package-lock.json
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: FASTAPI_BASE_URL
        fromService:
          name: sarksearch-engine
          type: pserv
          property: hostport
      - key: CACHE_TTL_MS
        value: "300000"
      - key: REQUEST_TIMEOUT_MS
        value: "100000"
      - key: CORS_ORIGIN
        value: "*"
      - key: MONGODB_URI
        value: ""
      - key: DEFAULT_SEARCH_LIMIT
        value: "5"
      - key: MAX_SEARCH_LIMIT
        value: "20"
      - key: RECENT_SEARCH_LIMIT
        value: "6"

  - type: pserv
    name: sarksearch-engine
    runtime: python
    plan: starter
    branch: master
    autoDeploy: true
    buildCommand: pip install -r services/recommendation-engine/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir services/recommendation-engine
    buildFilter:
      paths:
        - services/recommendation-engine/**
    envVars:
      - key: RECOMMENDATION_ENGINE_NAME
        value: SARKSearch Recommendation Engine
      - key: RECOMMENDATION_ENGINE_HOST
        value: 0.0.0.0
      - key: DEFAULT_SEARCH_LIMIT
        value: "5"
      - key: MAX_SEARCH_LIMIT
        value: "20"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
